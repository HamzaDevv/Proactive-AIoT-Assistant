services:
  - type: web
    name: home-assistant-brain
    env: docker
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HA_TUNNEL_URL
        sync: false
      - key: TUNNEL_HMAC_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
